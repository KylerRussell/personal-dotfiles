-- Conky Config: Monitor 1 (Virtual-1) — Globe
-- Position: Bottom-left clock, top-left telemetry, bottom-right figure label

conky.config = {
    -- Window
    own_window = true,
    own_window_type = 'override',
    own_window_class = 'conky1',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

    -- Position on Monitor 1 (starts at x=0)
    alignment = 'top_left',
    gap_x = 0,
    gap_y = 0,
    minimum_width = 1920,
    maximum_width = 1920,
    minimum_height = 1080,

    -- Rendering
    double_buffer = true,
    update_interval = 1.0,
    cpu_avg_samples = 4,
    net_avg_samples = 2,
    no_buffers = true,

    -- Font
    use_xft = true,
    font = 'Barlow Condensed:bold:size=14',
    override_utf8_locale = true,

    -- Colors
    default_color = '3a3a3a',        -- Dark charcoal for main text
    color1 = '3a3a3a',               -- Charcoal (clock)
    color2 = '8a8a8a',               -- Medium gray (labels)
    color3 = 'e25822',               -- Red-orange accent
    color4 = '6b6b6b',               -- Dim gray (figure labels)

    -- Drawing
    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    draw_graph_borders = false,
};

conky.text = [[
# Top-left telemetry block
${voffset 40}${offset 60}${color2}${font Barlow Condensed:size=11}SECTOR: CENTRAL${font}
${offset 60}${color2}${font Barlow Condensed:size=11}LAT: 39.0997°N${font}
${offset 60}${color2}${font Barlow Condensed:size=11}LON: 94.5786°W${font}
${offset 60}${color2}${font Barlow Condensed:size=11}ELEV: 276m${font}
${offset 60}${color3}${font Barlow Condensed:size=11}STATUS: ACTIVE${font}
#
# Large clock — bottom-left area
${voffset 620}${offset 80}${color1}${font Barlow Condensed:bold:size=120}${time %H:%M}${font}
${offset 85}${color2}${font Barlow Condensed:size=28}${time %B %eth %Y}${font}
#
# Bottom-right figure label
${voffset 10}${alignr 60}${color4}${font Barlow Condensed:size=10}(FIG.1) HEMISPHERIC PROJECTION${font}
]];
