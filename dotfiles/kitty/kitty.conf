# --- ANDURIL FROSTED-GLASS TERMINAL ---
# Light, translucent, muted-professional. Pairs with the warm-gray desktop.

# Font
font_family      JetBrains Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Frosted light background, slightly translucent so the desktop + globe show
# through. (Hyprland blur is off for VM performance, so this reads as a clean
# translucent panel rather than a blurred one — enable blur in theme.conf if you
# want the true frosted effect.)
background            #f6f4ef
foreground            #3a3a3a
background_opacity    0.86

# Cursor + selection
cursor                #d9512f
cursor_text_color     #f6f4ef
selection_background   #d8d5cc
selection_foreground   #2e2e2e
url_color              #3f8a8a

# --- Muted Anduril palette (tuned to read on a light background) ---
# black / bright black  -> dim + secondary gray text
color0  #4d4d4d
color8  #8a8a8a
# red / red-orange       -> errors, highlights, the accent
color1  #d0492a
color9  #e25822
# green                  -> muted
color2  #5a7d5a
color10 #6e946e
# yellow / amber         -> warnings
color3  #b07d2a
color11 #c8902e
# blue / muted slate     -> info
color4  #3f6f8f
color12 #5a86a6
# magenta                -> muted
color5  #8a5f7a
color13 #a47494
# cyan / muted teal      -> strings
color6  #3f8a8a
color14 #5aa0a0
# white                  -> charcoal text (default foreground tones)
color7  #3a3a3a
color15 #2e2e2e

# Generous internal padding, no decorations (Hyprland tiles it)
window_padding_width    18
hide_window_decorations  yes

confirm_os_window_close  0
enable_audio_bell        no
