# --- TACTICAL KITTY DEVELOPER TERMINAL ---

# Font configuration (highly legible monospace)
font_family      JetBrains Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# Brutalist theme colors
background            #0a0d14
foreground            #e4e4e7
selection_background  #1e293b
selection_foreground  #ffffff

# Black
color0  #18181b
color8  #27272a
# Red
color1  #f43f5e
color9  #fda4af
# Green
color2  #10b981
color10 #6ee7b7
# Yellow
color3  #f59e0b
color11 #fde047
# Blue
color4  #3b82f6
color12 #93c5fd
# Magenta
color5  #d946ef
color13 #f5d0fe
# Cyan
color6  #06b6d4
color14 #67e8f9
# White
color7  #e4e4e7
color15 #ffffff

# Window layout (rigid padding, no fluff)
window_padding_width 4
confirm_os_window_close 0
enable_audio_bell no
