# Anduril HUD Wallpaper Configuration
# Three distinct backgrounds — one per monitor

preload = ~/.config/hypr/wallpapers/globe.png
preload = ~/.config/hypr/wallpapers/citymap.png
preload = ~/.config/hypr/wallpapers/topography.png

wallpaper = Virtual-1,~/.config/hypr/wallpapers/globe.png
wallpaper = Virtual-2,~/.config/hypr/wallpapers/citymap.png
wallpaper = Virtual-3,~/.config/hypr/wallpapers/topography.png

# Disable splash
splash = false
