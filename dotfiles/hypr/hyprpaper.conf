# Anduril HUD Wallpaper Configuration
# hyprpaper v0.8+ block syntax: one wallpaper{} block per monitor.
splash = false

wallpaper {
    monitor = Virtual-1
    path = /root/.config/hypr/wallpapers/globe.png
}

wallpaper {
    monitor = Virtual-2
    path = /root/.config/hypr/wallpapers/citymap.png
}

wallpaper {
    monitor = Virtual-3
    path = /root/.config/hypr/wallpapers/topography.png
}
