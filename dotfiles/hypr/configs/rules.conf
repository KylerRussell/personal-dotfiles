# Structural Layout Adjustments

# Floating overrides for tools, setups, or radial scripts
windowrule = float 1, ^(floating_utility|menu)$
windowrule = center 1, ^(floating_utility)$

# Seamless Dialogs
windowrule = float 1, title:^(Open File|Save File|Confirm)$

# --- Conky HUD Overlay Rules ---
# Each conky instance gets pinned to its monitor as a transparent desktop widget

# Monitor 1 — Globe
windowrulev2 = float, class:^(conky)$, title:^(conky_monitor1)$
windowrulev2 = pin, class:^(conky)$, title:^(conky_monitor1)$
windowrulev2 = monitor Virtual-1, class:^(conky)$, title:^(conky_monitor1)$
windowrulev2 = move 0 0, class:^(conky)$, title:^(conky_monitor1)$
windowrulev2 = size 1920 1080, class:^(conky)$, title:^(conky_monitor1)$

# Monitor 2 — City Grid
windowrulev2 = float, class:^(conky)$, title:^(conky_monitor2)$
windowrulev2 = pin, class:^(conky)$, title:^(conky_monitor2)$
windowrulev2 = monitor Virtual-2, class:^(conky)$, title:^(conky_monitor2)$
windowrulev2 = move 1920 0, class:^(conky)$, title:^(conky_monitor2)$
windowrulev2 = size 1920 1080, class:^(conky)$, title:^(conky_monitor2)$

# Monitor 3 — Topography
windowrulev2 = float, class:^(conky)$, title:^(conky_monitor3)$
windowrulev2 = pin, class:^(conky)$, title:^(conky_monitor3)$
windowrulev2 = monitor Virtual-3, class:^(conky)$, title:^(conky_monitor3)$
windowrulev2 = move 3840 0, class:^(conky)$, title:^(conky_monitor3)$
windowrulev2 = size 1920 1080, class:^(conky)$, title:^(conky_monitor3)$
