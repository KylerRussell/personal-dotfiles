# Structural Layout Adjustments

# Global rule: Everything tiles cleanly by default
windowrule = tile 1, match:class ^(.*)$

# Floating overrides for tools, setups, or radial scripts
windowrule = float 1, match:class ^(floating_utility|menu)$
windowrule = center 1, match:class ^(floating_utility)$

# Seamless Dialogs
windowrule = float 1, match:title ^(Open File|Save File|Confirm)$

# --- Conky HUD Overlay Rules ---
# Each conky instance gets pinned to its monitor as a transparent desktop widget

# Monitor 1 — Globe
windowrulev2 = float, title:^(conky_monitor1)$
windowrulev2 = noblur, title:^(conky_monitor1)$
windowrulev2 = noshadow, title:^(conky_monitor1)$
windowrulev2 = noborder, title:^(conky_monitor1)$
windowrulev2 = nofocus, title:^(conky_monitor1)$
windowrulev2 = pin, title:^(conky_monitor1)$
windowrulev2 = monitor Virtual-1, title:^(conky_monitor1)$
windowrulev2 = move 0 0, title:^(conky_monitor1)$
windowrulev2 = size 1920 1080, title:^(conky_monitor1)$

# Monitor 2 — City Grid
windowrulev2 = float, title:^(conky_monitor2)$
windowrulev2 = noblur, title:^(conky_monitor2)$
windowrulev2 = noshadow, title:^(conky_monitor2)$
windowrulev2 = noborder, title:^(conky_monitor2)$
windowrulev2 = nofocus, title:^(conky_monitor2)$
windowrulev2 = pin, title:^(conky_monitor2)$
windowrulev2 = monitor Virtual-2, title:^(conky_monitor2)$
