# Structural Layout Adjustments

# Floating overrides for tools, setups, or radial scripts
windowrule = float 1, ^(floating_utility|menu)$
windowrule = center 1, ^(floating_utility)$

# Seamless Dialogs
windowrule = float 1, title:^(Open File|Save File|Confirm)$

# --- Conky HUD Overlay Rules ---
# Each conky instance gets pinned to its monitor as a transparent desktop widget

# Monitor 1 — Globe
windowrule = float 1, ^(conky_monitor1)$
windowrule = pin 1, ^(conky_monitor1)$
windowrule = monitor Virtual-1, ^(conky_monitor1)$
windowrule = move 0 0, ^(conky_monitor1)$
windowrule = size 1920 1080, ^(conky_monitor1)$

# Monitor 2 — City Grid
windowrule = float 1, ^(conky_monitor2)$
windowrule = pin 1, ^(conky_monitor2)$
windowrule = monitor Virtual-2, ^(conky_monitor2)$
windowrule = move 0 0, ^(conky_monitor2)$
windowrule = size 1920 1080, ^(conky_monitor2)$

# Monitor 3 — Topography
windowrule = float 1, ^(conky_monitor3)$
windowrule = pin 1, ^(conky_monitor3)$
windowrule = monitor Virtual-3, ^(conky_monitor3)$
windowrule = move 0 0, ^(conky_monitor3)$
windowrule = size 1920 1080, ^(conky_monitor3)$
