# Structural Layout Adjustments

# Global rule: Everything tiles cleanly by default
windowrule = tile, class:^(.*)$

# Floating overrides for tools, setups, or radial scripts
windowrule = float, class:^(floating_utility|menu)$
windowrule = center, class:^(floating_utility)$

# Seamless Dialogs
windowrule = float, title:^(Open File|Save File|Confirm)$

# --- Conky HUD Overlay Rules ---
# Each conky instance gets pinned to its monitor as a transparent desktop widget

# Monitor 1 — Globe
windowrule = float, title:^(conky_monitor1)$
windowrule = pin, title:^(conky_monitor1)$
windowrule = monitor Virtual-1, title:^(conky_monitor1)$
windowrule = move 0 0, title:^(conky_monitor1)$
windowrule = size 1920 1080, title:^(conky_monitor1)$

# Monitor 2 — City Grid
windowrule = float, title:^(conky_monitor2)$
windowrule = pin, title:^(conky_monitor2)$
windowrule = monitor Virtual-2, title:^(conky_monitor2)$
windowrule = move 0 0, title:^(conky_monitor2)$
windowrule = size 1920 1080, title:^(conky_monitor2)$

# Monitor 3 — Topography
windowrule = float, title:^(conky_monitor3)$
windowrule = pin, title:^(conky_monitor3)$
windowrule = monitor Virtual-3, title:^(conky_monitor3)$
windowrule = move 0 0, title:^(conky_monitor3)$
windowrule = size 1920 1080, title:^(conky_monitor3)$
