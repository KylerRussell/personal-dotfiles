# Structural Layout Adjustments

# Global rule: Everything tiles cleanly by default
windowrule = tile 1, match:class ^(.*)$

# Floating overrides for tools, setups, or radial scripts
windowrule = float 1, match:class ^(floating_utility|menu)$
windowrule = center 1, match:class ^(floating_utility)$

# Seamless Dialogs
windowrule = float 1, match:title ^(Open File|Save File|Confirm)$

# --- Conky HUD Overlay Rules ---
# Each conky instance gets pinned to its monitor as a transparent desktop widget

# Monitor 1 — Globe
windowrule = float 1, match:title ^(conky_monitor1)$
windowrule = noblur 1, match:title ^(conky_monitor1)$
windowrule = noshadow 1, match:title ^(conky_monitor1)$
windowrule = noborder 1, match:title ^(conky_monitor1)$
windowrule = nofocus 1, match:title ^(conky_monitor1)$
windowrule = pin 1, match:title ^(conky_monitor1)$
windowrule = monitor Virtual-1, match:title ^(conky_monitor1)$
windowrule = move 0 0, match:title ^(conky_monitor1)$
windowrule = size 1920 1080, match:title ^(conky_monitor1)$

# Monitor 2 — City Grid
