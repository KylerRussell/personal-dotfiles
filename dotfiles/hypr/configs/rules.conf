# Structural Layout Adjustments

# Global rule: Everything tiles cleanly by default
windowrule = tile 1, match:class ^(.*)$

# Floating overrides for tools, setups, or radial scripts
windowrule = float 1, match:class ^(floating_utility|menu)$
windowrule = center 1, match:class ^(floating_utility)$

# Seamless Dialogs
windowrule = float 1, match:title ^(Open File|Save File|Confirm)$

# --- Conky HUD Overlay Rules ---
# Each conky instance gets pinned to its monitor as a transparent desktop widget

# Monitor 1 — Globe
windowrule {
    match:title = ^(conky_monitor1)$
    float = true
    no_blur = true
    no_shadow = true
    no_border = true
    no_initial_focus = true
    pin = true
    monitor = Virtual-1
    move = 0 0
    size = 1920 1080
}

