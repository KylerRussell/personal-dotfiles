# Structural Layout Adjustments
#
# Hyprland changed windowrule syntax in 0.53.0. The rules below use the
# CURRENT (0.53.0+) "match:" form. If `hyprctl version` shows 0.52 or older,
# comment these out and use the legacy block at the bottom instead.
#
# Format (0.53.0+):  windowrule = ACTION VALUE, match:FIELD VALUE
# Default behavior already tiles everything, so an explicit global tile
# rule is unnecessary and only adds noise — floats are the real overrides.

# Floating overrides for utility/menu windows
windowrule = float on,   match:class (floating_utility|menu)
windowrule = center on,  match:class (floating_utility)

# Seamless dialogs
windowrule = float on,   match:title (Open File|Save File|Confirm)

# ---------------------------------------------------------------------------
# LEGACY syntax for Hyprland 0.45 - 0.52 (action first, then class:/title:).
# Uncomment this block and comment the one above if you are on an older build.
# ---------------------------------------------------------------------------
# windowrule = float, class:^(floating_utility|menu)$
# windowrule = center, class:^(floating_utility)$
# windowrule = float, title:^(Open File|Save File|Confirm)$

# ---------------------------------------------------------------------------
# Conky HUD overlays — pin one per monitor.
# Conky reports its window class as conky1/conky2/conky3 (own_window_class).
# Hyprland otherwise tiles them all onto the focused monitor, so we float each
# one and move it to that monitor's absolute origin (0 / 1920 / 3840 px).
# ---------------------------------------------------------------------------
windowrule = float on,        match:class conky1
windowrule = move 0 0,        match:class conky1
windowrule = size 1920 1080,  match:class conky1
windowrule = pin on,          match:class conky1

windowrule = float on,        match:class conky2
windowrule = move 1920 0,     match:class conky2
windowrule = size 1920 1080,  match:class conky2
windowrule = pin on,          match:class conky2

windowrule = float on,        match:class conky3
windowrule = move 3840 0,     match:class conky3
windowrule = size 1920 1080,  match:class conky3
windowrule = pin on,          match:class conky3
