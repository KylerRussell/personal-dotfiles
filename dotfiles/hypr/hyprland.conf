# --- ANDURIL HUD WORKSTATION CONFIG ---

# Monitor Configurations (3 virtual displays for QEMU multi-monitor)
monitor=Virtual-1,1920x1080,0x0,1
monitor=Virtual-2,1920x1080,1920x0,1
monitor=Virtual-3,1920x1080,3840x0,1

# Import Modularity Layers
source = ~/.config/hypr/configs/theme.conf
source = ~/.config/hypr/configs/binds.conf
source = ~/.config/hypr/configs/rules.conf

# Autostart Core Components
exec-once = swaybg -o Virtual-1 -i /root/.config/hypr/wallpapers/globe.png -m fill
exec-once = swaybg -o Virtual-2 -i /root/.config/hypr/wallpapers/citymap.png -m fill
exec-once = swaybg -o Virtual-3 -i /root/.config/hypr/wallpapers/topography.png -m fill
# HUD overlays via nwg-wrapper — layer-shell BOTTOM layer (above the wallpaper,
# below every window) and non-interactive: can't be focused, dragged, or closed.
# Per monitor: telemetry (top-left), clock+date (bottom-left), figure (bottom-right).
exec-once = nwg-wrapper -o Virtual-1 -s /root/.config/nwg-wrapper/telemetry.sh -c /root/.config/nwg-wrapper/style.css -p left -a start -mt 90 -ml 60 -l 1
exec-once = nwg-wrapper -o Virtual-1 -s /root/.config/nwg-wrapper/clock.sh     -c /root/.config/nwg-wrapper/style.css -p left -a end -mb 90 -ml 60 -l 1 -r 2000
exec-once = nwg-wrapper -o Virtual-1 -t /root/.config/nwg-wrapper/fig1.pango   -c /root/.config/nwg-wrapper/style.css -p right -a end -mb 28 -mr 40 -l 1
exec-once = nwg-wrapper -o Virtual-2 -s /root/.config/nwg-wrapper/telemetry.sh -c /root/.config/nwg-wrapper/style.css -p left -a start -mt 90 -ml 60 -l 1
exec-once = nwg-wrapper -o Virtual-2 -s /root/.config/nwg-wrapper/clock.sh     -c /root/.config/nwg-wrapper/style.css -p left -a end -mb 90 -ml 60 -l 1 -r 2000
exec-once = nwg-wrapper -o Virtual-2 -t /root/.config/nwg-wrapper/fig2.pango   -c /root/.config/nwg-wrapper/style.css -p right -a end -mb 28 -mr 40 -l 1
exec-once = nwg-wrapper -o Virtual-3 -s /root/.config/nwg-wrapper/telemetry.sh -c /root/.config/nwg-wrapper/style.css -p left -a start -mt 90 -ml 60 -l 1
exec-once = nwg-wrapper -o Virtual-3 -s /root/.config/nwg-wrapper/clock.sh     -c /root/.config/nwg-wrapper/style.css -p left -a end -mb 90 -ml 60 -l 1 -r 2000
exec-once = nwg-wrapper -o Virtual-3 -t /root/.config/nwg-wrapper/fig3.pango   -c /root/.config/nwg-wrapper/style.css -p right -a end -mb 28 -mr 40 -l 1

# Environment Variables for Paravirtualization Stability
env = WLR_NO_HARDWARE_CURSORS,1
env = XDG_CURRENT_DESKTOP,Hyprland
