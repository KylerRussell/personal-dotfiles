# HUD configuration — per monitor: telemetry / hero (clock) / image / figure.
# Edit with the HUD config utility (SUPER+U) or by hand.
# Values must match a preset filename in presets/ (without extension),
# an image name in ~/.config/hypr/wallpapers/ (without .png), or off / none.
m1_telemetry=coordinates
m1_hero=clock24
m1_image=globe
m1_figure=fig1
m2_telemetry=coordinates
m2_hero=clock24
m2_image=citymap
m2_figure=fig2
m3_telemetry=coordinates
m3_hero=clock24
m3_image=topography
m3_figure=fig3
