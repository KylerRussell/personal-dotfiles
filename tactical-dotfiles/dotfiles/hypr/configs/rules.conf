# Structural Layout Adjustments

# Global rule: Everything tiles cleanly by default
windowrulev2 = tile, class:(.*)

# Floating overrides for tools, setups, or radial scripts
windowrulev2 = float, class:(floating_utility|menu)
windowrulev2 = center, class:(floating_utility)

# Seamless Dialogs
windowrulev2 = float, title:(Open File|Save File|Confirm)
